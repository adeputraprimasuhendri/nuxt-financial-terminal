kind: pipeline
type: docker
name: Development Pipeline

trigger:
  branch:
    - development

steps:
  - name: deploy
    image: docker:cli

    volumes:
      - name: dockersock
        path: /var/run/docker.sock

    commands:
      - docker compose down
      - docker compose up -d --build

  - name: docker-clean
    image: docker:cli

    volumes:
      - name: dockersock
        path: /var/run/docker.sock

    commands:
      - docker system prune -a --volumes -f

volumes:
  - name: dockersock
    host:
      path: /var/run/docker.sock