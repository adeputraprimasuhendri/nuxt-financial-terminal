server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy for internal signals
    location /api/signals {
        proxy_pass http://trade_be:8080/signals;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy for tickers
    location /api/tickers {
        proxy_pass http://trade_be:8080/tickers;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy for candles
    location /api/candles {
        proxy_pass http://trade_be:8080/marketdata/candles;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy for news
    location /api/news {
        proxy_pass https://www.alphavantage.co/query;
        proxy_ssl_server_name on;
        proxy_set_header Host www.alphavantage.co;
    }

    # Proxy WebSocket ticks to external bridge
    location /ws/ticks {
        proxy_pass http://mt5-bridge:8000/ws/ticks;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_ssl_server_name on;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}